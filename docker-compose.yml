services:
  ui:
    image: ${REGISTRY:-ghcr.io/ds17f/deadly-monorepo}/ui:${IMAGE_TAG:-latest}
    restart: "no"
    # no volumes — files extracted by deploy script

  caddy:
    image: ${REGISTRY:-ghcr.io/ds17f/deadly-monorepo}/caddy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS}
      - SHARE_ADDRESS=${SHARE_ADDRESS}
      # Injected into /api/analytics requests so the browser never holds it.
      - ANALYTICS_API_KEY=${ANALYTICS_API_KEY}
      # emma-shop (Comet Tail Crafts) public host, fronted by this Caddy. Set per
      # environment (prod) via SHOP_ADDRESS; defaults to an inert internal name so
      # the Caddy site block is never empty/invalid where the shop isn't hosted.
      # See docs/docs/developer/hosting-emma-shop.md.
      - SHOP_ADDRESS=${SHOP_ADDRESS:-shop.localhost}
      # The Starlight Loft public host, fronted by this Caddy. Set per environment
      # via LOFT_ADDRESS; defaults to an inert internal name where not hosted.
      # See docs/docs/developer/hosting-the-starlight-loft.md.
      - LOFT_ADDRESS=${LOFT_ADDRESS:-loft.localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./ui-out:/srv/ui:ro
    depends_on:
      - api
    # `default` MUST stay (Caddy reaches api/ui/ws here); `web` is the shared
    # external network that lets Caddy reach the independently-deployed emma-shop
    # container by name. Created idempotently during deploy.
    networks:
      - default
      - web

  api:
    image: ${REGISTRY:-ghcr.io/ds17f/deadly-monorepo}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - USERS_DB_PATH=/app/data/users.db
      - SHOW_INDEX_PATH=/app/show-index.json
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}
      - GOOGLE_ANDROID_CLIENT_ID=${GOOGLE_ANDROID_CLIENT_ID}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      - APPLE_KEY_ID=${APPLE_KEY_ID}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY}
      - REDIS_URL=redis://redis:6379
      - ANALYTICS_DB_PATH=/app/data/analytics.db
      - ANALYTICS_API_KEY=${ANALYTICS_API_KEY}
      - ANALYTICS_RAW_RETENTION_DAYS=${ANALYTICS_RAW_RETENTION_DAYS:-180}
      - APP_STORE_CONNECT_KEY_ID=${APP_STORE_CONNECT_KEY_ID}
      - APP_STORE_CONNECT_ISSUER_ID=${APP_STORE_CONNECT_ISSUER_ID}
      - APP_STORE_CONNECT_PRIVATE_KEY=${APP_STORE_CONNECT_PRIVATE_KEY}
      - APP_STORE_CONNECT_APP_ID=${APP_STORE_CONNECT_APP_ID}
      - APP_STORE_CONNECT_BETA_GROUP_ID=${APP_STORE_CONNECT_BETA_GROUP_ID}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - ./api-data:/app/data
    expose:
      - "3001"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data

volumes:
  caddy_data:
  caddy_config:
  redis_data:

networks:
  # Shared with the independently-deployed emma-shop stack. Declared external so
  # this compose never creates/owns it; the deploy runs `docker network create
  # web` idempotently first. Only `caddy` joins it; api/ui/redis stay on default.
  web:
    external: true
