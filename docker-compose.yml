services:
  ui:
    image: ${REGISTRY:-ghcr.io/ds17f/deadly-monorepo}/ui:${IMAGE_TAG:-latest}
    restart: "no"
    # no volumes — files extracted by deploy script

  caddy:
    image: ${REGISTRY:-ghcr.io/ds17f/deadly-monorepo}/caddy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS}
      - SHARE_ADDRESS=${SHARE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./ui-out:/srv/ui:ro
    depends_on:
      - api

  api:
    image: ${REGISTRY:-ghcr.io/ds17f/deadly-monorepo}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - USERS_DB_PATH=/app/data/users.db
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}
      - GOOGLE_ANDROID_CLIENT_ID=${GOOGLE_ANDROID_CLIENT_ID}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      - APPLE_KEY_ID=${APPLE_KEY_ID}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY}
      - REDIS_URL=redis://redis:6379
      - ANALYTICS_DB_PATH=/app/data/analytics.db
      - ANALYTICS_API_KEY=${ANALYTICS_API_KEY}
      - ANALYTICS_RAW_RETENTION_DAYS=${ANALYTICS_RAW_RETENTION_DAYS:-}
    volumes:
      - ./api-data:/app/data
    expose:
      - "3001"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data

volumes:
  caddy_data:
  caddy_config:
  redis_data:
