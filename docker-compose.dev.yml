services:
  caddy:
    ports: !override
      - "8080:80"
      - "8081:8081"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./web:/srv/share:ro

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder
    command: npx tsx watch src/server.ts
    ports:
      - "3001:3001"
    volumes:
      - ./api/src:/app/src:ro
      - ./api-data:/app/data
    environment:
      - LOG_LEVEL=debug
