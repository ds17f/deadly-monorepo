services:
  # Dev skips the UI build container — run `make ui-build` on the host instead.
  # That writes a static export to ./ui/out, which Caddy serves via the bind
  # mount below. Avoids a docker image rebuild on every UI change.
  ui:
    profiles: ["never"]

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    ports: !override
      - "8080:80"
      - "8081:8081"
    volumes: !override
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro,z
      - ./ui/dist:/srv/ui:ro,z
      - ./web:/srv/share:ro,z
    depends_on:
      - api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder
    command: npx tsx watch src/server.ts
    ports:
      - "3001:3001"
    volumes:
      - ./api/src:/app/src:ro,z
      - ./api-data:/app/data:z
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - ENABLE_DEV_SIGNIN=${ENABLE_DEV_SIGNIN:-}
      # ADR-0017 test affordance: delay/jitter (ms) on Connect state broadcasts so the
      # position-echo round-trip exceeds the old 2s seek threshold — reproduces the
      # self-skip bug on one device. Default 0 (no effect). e.g. CONNECT_BROADCAST_DELAY_MS=3000
      - CONNECT_BROADCAST_DELAY_MS=${CONNECT_BROADCAST_DELAY_MS:-0}
      - CONNECT_BROADCAST_JITTER_MS=${CONNECT_BROADCAST_JITTER_MS:-0}
