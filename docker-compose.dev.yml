services:
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    volumes:
      - ui_static:/out

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    ports: !override
      - "8080:80"
      - "8081:8081"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro,z
      - ui_static:/srv/ui:ro
      - ./web:/srv/share:ro,z
    depends_on:
      - api
      - ui

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder
    command: npx tsx watch src/server.ts
    ports:
      - "3001:3001"
    volumes:
      - ./api/src:/app/src:ro,z
      - ./api-data:/app/data:z
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}

volumes:
  ui_static:
