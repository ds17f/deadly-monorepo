services:
  ui:
    volumes:
      - ui_static:/out

  caddy:
    ports: !override
      - "8080:80"
      - "8081:8081"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ui_static:/srv/ui:ro
      - ./web:/srv/share:ro
    depends_on:
      - api
      - ui

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder
    command: npx tsx watch src/server.ts
    ports:
      - "3001:3001"
    volumes:
      - ./api/src:/app/src:ro
      - ./api-data:/app/data
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug

volumes:
  ui_static:
