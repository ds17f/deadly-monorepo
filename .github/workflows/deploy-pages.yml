name: Docs - Deploy

on:
  push:
    branches:
      - main
    paths:
      - "ui/**"
      - "data/version"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Fetch show data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATA_VERSION=$(cat data/version | tr -d '[:space:]')
          echo "Fetching data-v${DATA_VERSION} release..."
          gh release download "data-v${DATA_VERSION}" \
            --repo "${{ github.repository }}" \
            --pattern 'data.zip' \
            --output /tmp/data.zip
          mkdir -p ui/data
          unzip -q /tmp/data.zip -d ui/data
          rm /tmp/data.zip
          echo "Extracted $(ls ui/data/shows/ | wc -l) shows, $(ls ui/data/recordings/ | wc -l) recordings"

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: "./ui/out"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
