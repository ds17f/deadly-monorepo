name: Mobile - Android Promote

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Promotion target'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - production
      version:
        description: 'Version to promote (e.g. 2.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      with:
        # Check out the dispatched ref (typically main) so the Fastfile
        # used here is the latest. Android release commits land on main
        # directly (see scripts/release.sh), so the CHANGELOG entry for
        # the version being promoted is present on main.
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@a6e6f86333f0a2523ece813039b8b4be04560854 # v1.190.0
      with:
        ruby-version: '3.1'

    - name: Install fastlane
      run: cd androidApp && bundle install

    - name: Decode Play Store service account JSON
      run: |
        mkdir -p .secrets
        echo "${{ secrets.PLAY_STORE_JSON_BASE64 }}" | base64 -d > .secrets/thedeadly-app-f48493c2a133.json

    - name: Resolve stage display name
      id: stage
      run: |
        if [ "${{ inputs.stage }}" = "alpha" ]; then
          echo "display_name=Closed Alpha" >> "$GITHUB_OUTPUT"
        elif [ "${{ inputs.stage }}" = "beta" ]; then
          echo "display_name=Open Testing" >> "$GITHUB_OUTPUT"
        else
          echo "display_name=Production" >> "$GITHUB_OUTPUT"
        fi

    - name: Extract release notes from CHANGELOG
      run: |
        VERSION="${{ inputs.version }}"
        RAW=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" androidApp/CHANGELOG.md | sed '/^[[:space:]]*$/d')
        if [ -z "$RAW" ]; then
          echo "::error::No CHANGELOG entry found for version ${VERSION} in androidApp/CHANGELOG.md." >&2
          echo "::error::Play Console needs release notes per track; an empty value silently truncates them." >&2
          echo "::error::Check that the android/v${VERSION} tag points at a commit containing the '## [${VERSION}]' section." >&2
          exit 1
        fi
        if [ ${#RAW} -gt 500 ]; then
          RAW="${RAW:0:497}..."
        fi
        echo "RELEASE_NOTES<<EOF" >> "$GITHUB_ENV"
        echo "$RAW" >> "$GITHUB_ENV"
        echo "EOF" >> "$GITHUB_ENV"

    - name: Promote to alpha
      id: promote
      if: inputs.stage == 'alpha'
      run: cd androidApp && bundle exec fastlane promote_internal_to_alpha

    - name: Promote to open testing (beta)
      id: promote-beta
      if: inputs.stage == 'beta'
      run: cd androidApp && bundle exec fastlane promote_internal_to_beta

    - name: Promote to production
      id: promote-prod
      if: inputs.stage == 'production'
      run: cd androidApp && bundle exec fastlane promote_alpha_to_production

    - name: Update release status (success)
      if: success()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        chmod +x scripts/update-release-status.sh
        ./scripts/update-release-status.sh android "${{ inputs.version }}" "${{ steps.stage.outputs.display_name }}" deployed

    - name: Update release status (failure)
      if: failure() && (steps.promote.outcome == 'failure' || steps.promote-beta.outcome == 'failure' || steps.promote-prod.outcome == 'failure')
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        chmod +x scripts/update-release-status.sh
        ./scripts/update-release-status.sh android "${{ inputs.version }}" "${{ steps.stage.outputs.display_name }}" failed

    - name: Clean up secrets
      if: always()
      run: rm -rf .secrets
