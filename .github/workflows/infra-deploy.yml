name: Deploy Alpha

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: "Deploy to alpha"
    runs-on: ubuntu-latest
    environment: alpha
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_TFSTATE_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_TFSTATE_APP_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Terraform Init
        working-directory: infra/digitalocean
        run: terraform init

      - name: Get server IP
        id: server
        working-directory: infra/digitalocean
        run: echo "ip=$(terraform output -raw droplet_ip)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ steps.server.outputs.ip }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Clone or update repo on server
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
          REPO: ${{ github.repository }}
          REF: ${{ inputs.ref }}
        run: |
          ssh "$SERVER" bash -s <<SCRIPT
            set -euo pipefail
            if [ -d /opt/deadly/.git ]; then
              echo "Updating existing clone..."
              cd /opt/deadly
              git fetch origin
              git checkout "${REF}" 2>/dev/null || git checkout "origin/${REF}"
              git pull origin "${REF}" 2>/dev/null || true
            else
              echo "Cloning fresh..."
              # cloud-init may have created /opt/deadly already; clone beside it then swap
              rm -rf /tmp/deadly-clone
              git clone "https://github.com/${REPO}.git" /tmp/deadly-clone
              # preserve cloud-init marker if present
              if [ -f /opt/deadly/.cloud-init-complete ]; then
                cp /opt/deadly/.cloud-init-complete /tmp/deadly-clone/
              fi
              sudo rm -rf /opt/deadly
              sudo mv /tmp/deadly-clone /opt/deadly
              sudo chown -R deploy:deploy /opt/deadly
              cd /opt/deadly
              git checkout "${REF}" 2>/dev/null || git checkout "origin/${REF}"
            fi
            echo "HEAD: \$(git rev-parse --short HEAD)"
          SCRIPT

      - name: Read data version
        id: data
        run: echo "version=$(cat data/version)" >> "$GITHUB_OUTPUT"

      - name: Download and extract data on server
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
          DATA_VERSION: ${{ steps.data.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          ssh "$SERVER" bash -s <<SCRIPT
            set -euo pipefail
            cd /opt/deadly

            echo "Downloading data v${DATA_VERSION}..."
            curl -fSL -o /tmp/data.zip \
              "https://github.com/${REPO}/releases/download/data-v${DATA_VERSION}/data.zip"

            echo "Extracting to ui/data/..."
            rm -rf ui/data
            mkdir -p ui/data
            sudo apt-get install -y -qq unzip >/dev/null 2>&1 || true
            unzip -qo /tmp/data.zip -d ui/data/
            rm /tmp/data.zip

            echo "Data: \$(ls ui/data/shows/ | wc -l) shows, \$(ls ui/data/recordings/ | wc -l) recordings"
          SCRIPT

      - name: Write environment file
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        run: |
          # Escape newlines in PEM key so it stays on one line in .env
          APPLE_PRIVATE_KEY_ESCAPED=$(printf '%s' "$APPLE_PRIVATE_KEY" | sed ':a;N;$!ba;s/\n/\\n/g')
          printf '%s\n' \
            "AUTH_SECRET=${AUTH_SECRET}" \
            "AUTH_URL=${AUTH_URL}" \
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
            "GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}" \
            "GOOGLE_ANDROID_CLIENT_ID=${GOOGLE_ANDROID_CLIENT_ID}" \
            "APPLE_CLIENT_ID=${APPLE_CLIENT_ID}" \
            "APPLE_TEAM_ID=${APPLE_TEAM_ID}" \
            "APPLE_KEY_ID=${APPLE_KEY_ID}" \
            "APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY_ESCAPED}" \
            | ssh "$SERVER" 'cat > /opt/deadly/.env && chmod 600 /opt/deadly/.env'

      - name: Backup database to B2
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_BACKUPS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_BACKUPS_APP_KEY }}
          B2_ENDPOINT: https://s3.us-west-004.backblazeb2.com
        run: |
          # Create backup on server using SQLite's safe .backup command
          HAS_DB=$(ssh "$SERVER" '[ -f /opt/deadly/api-data/users.db ] && echo yes || echo no')
          if [ "$HAS_DB" = "no" ]; then
            echo "No database found — skipping backup (first deploy)"
            exit 0
          fi

          ssh "$SERVER" 'sqlite3 /opt/deadly/api-data/users.db ".backup /tmp/users-backup.db"'
          echo "Backup created on server"

          # Download and upload to B2
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          scp "$SERVER:/tmp/users-backup.db" "/tmp/users-${TIMESTAMP}.db"

          echo "Uploading to B2..."
          aws s3 cp "/tmp/users-${TIMESTAMP}.db" \
            "s3://deadly-backups/db/users-${TIMESTAMP}.db" \
            --endpoint-url "$B2_ENDPOINT" \
            --region us-west-004
          echo "Backup uploaded: s3://deadly-backups/db/users-${TIMESTAMP}.db"

          # Clean up
          ssh "$SERVER" "rm -f /tmp/users-backup.db"
          rm -f "/tmp/users-${TIMESTAMP}.db"

      - name: Build and start stack
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
        run: |
          ssh "$SERVER" bash -s <<'SCRIPT'
            set -euo pipefail
            cd /opt/deadly

            mkdir -p api-data ui-out

            # One-time migration from old named volume (ui_static)
            if docker volume inspect deadly_ui_static &>/dev/null; then
              echo "Migrating UI from named volume to bind mount..."
              docker run --rm --user "$(id -u):$(id -g)" \
                -v deadly_ui_static:/src:ro -v /opt/deadly/ui-out:/dst \
                busybox sh -c 'cp -r /src/. /dst/'
              docker compose rm -sf ui caddy 2>/dev/null || true
              docker volume rm deadly_ui_static 2>/dev/null || true
            fi

            # One-time migration from old api_data named volume
            if docker volume inspect deadly_api_data &>/dev/null; then
              echo "Migrating data from named volume to bind mount..."
              docker run --rm --user "$(id -u):$(id -g)" \
                -v deadly_api_data:/src:ro -v /opt/deadly/api-data:/dst \
                busybox sh -c 'cp -r /src/. /dst/'
              docker volume rm deadly_api_data 2>/dev/null || true
            fi

            # Pre-build ALL images (Caddy keeps running the whole time)
            # --no-cache on ui to ensure source changes are picked up
            echo "Pre-building all images..."
            docker compose build --no-cache ui
            docker compose build api

            # Extract new UI static files to staging directory
            echo "Extracting static files..."
            sudo rm -rf ui-out-next
            mkdir -p ui-out-next
            docker compose run --rm --no-deps -T \
              --user "$(id -u):$(id -g)" \
              -v /opt/deadly/ui-out-next:/extract \
              ui sh -c 'cp -r /out/. /extract/' </dev/null

            # Sync new files into ui-out in-place (no directory swap)
            # rsync replaces each file atomically (write tmp + rename),
            # and the directory inode stays the same so the bind mount works
            # — Caddy keeps serving without a restart
            echo "Syncing UI files..."
            rsync -a --delete ui-out-next/ ui-out/
            sudo rm -rf ui-out-next

            # Fast container swap — images already built, just restart
            echo "Swapping containers..."
            docker compose up -d api redis caddy

            docker system prune -f
            docker compose ps
          SCRIPT

      - name: Health check
        env:
          SITE: https://beta.thedeadly.app
        run: |
          echo "Waiting for $SITE/api/health ..."
          for i in $(seq 1 24); do
            if curl -fsSk "$SITE/api/health" -o /dev/null 2>/dev/null; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "  Attempt $i/24 — waiting 5s..."
            sleep 5
          done
          echo "::warning::Health check did not pass within 2 minutes"
          exit 1

      - name: Job summary
        if: always()
        env:
          SERVER_IP: ${{ steps.server.outputs.ip }}
          DATA_VERSION: ${{ steps.data.outputs.version }}
          REF: ${{ inputs.ref }}
        run: |
          HEALTH="unknown"
          if curl -fsSk "https://beta.thedeadly.app/api/health" -o /dev/null 2>/dev/null; then
            HEALTH="healthy"
          else
            HEALTH="unhealthy"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deploy Summary

          | Field | Value |
          |-------|-------|
          | Ref | \`${REF}\` |
          | Data version | \`${DATA_VERSION}\` |
          | Server IP | \`${SERVER_IP}\` |
          | Health | ${HEALTH} |
          | Site | [beta.thedeadly.app](https://beta.thedeadly.app) |
          EOF
