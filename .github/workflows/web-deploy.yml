name: Web - Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - beta
          - prod
        default: beta
      provider:
        description: "Cloud provider hosting the target"
        type: choice
        options:
          - hetzner
          - digitalocean
        default: hetzner
      ref:
        description: "Git ref to deploy (resolves to image tag)"
        default: "main"
        type: string
      update_dns:
        description: "Point GoDaddy A records at this server's IP after deploy"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    name: "Deploy to ${{ inputs.environment }} (${{ inputs.provider }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      REGISTRY: ghcr.io/${{ github.repository }}
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_TFSTATE_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_TFSTATE_APP_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve image tag
        id: image
        run: echo "tag=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify images exist
        run: |
          TAG="${{ steps.image.outputs.tag }}"
          echo "Checking for images tagged ${TAG}..."
          docker manifest inspect "ghcr.io/${{ github.repository }}/api:${TAG}" > /dev/null
          docker manifest inspect "ghcr.io/${{ github.repository }}/ui:${TAG}" > /dev/null
          docker manifest inspect "ghcr.io/${{ github.repository }}/caddy:${TAG}" > /dev/null
          echo "All images found."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      - name: Get server IP from Terraform
        id: server
        run: |
          cd infra/${{ inputs.provider }}
          if [ "${{ inputs.provider }}" = "digitalocean" ]; then
            cat > terraform.tfvars <<EOF
          do_token = "${{ secrets.DO_API_TOKEN }}"
          EOF
          elif [ "${{ inputs.provider }}" = "hetzner" ]; then
            cat > terraform.tfvars <<EOF
          hcloud_token = "${{ secrets.HCLOUD_TOKEN }}"
          EOF
          fi
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ../../ssh-key-2026-03-15.key.pub

          terraform init -input=false > /dev/null
          IP=$(terraform output -raw ${{ inputs.environment }}_ip 2>/dev/null || true)
          if [ -z "$IP" ]; then
            echo "::error::No server found for environment '${{ inputs.environment }}' in ${{ inputs.provider }} Terraform state"
            exit 1
          fi
          echo "ip=${IP}" >> "$GITHUB_OUTPUT"
          echo "Server IP: ${IP}"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ steps.server.outputs.ip }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy config to server
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
        run: |
          scp docker-compose.yml "$SERVER:/opt/deadly/"

      - name: Write environment file
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.GOOGLE_ANDROID_CLIENT_ID }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID }}
          APP_STORE_CONNECT_BETA_GROUP_ID: ${{ secrets.APP_STORE_CONNECT_BETA_GROUP_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SITE_ADDRESS="${{ vars.SITE_ADDRESS }}"
          SHARE_ADDRESS="${{ vars.SHARE_ADDRESS }}"
          # Optional: the emma-shop public host. Set as a per-environment variable
          # only where the shop is hosted (prod). Empty elsewhere — compose then
          # falls back to an inert default, so beta is unaffected.
          SHOP_ADDRESS="${{ vars.SHOP_ADDRESS }}"
          # Optional: The Starlight Loft public host. Set as a per-environment
          # variable only where the loft is hosted. Empty elsewhere — compose then
          # falls back to an inert default, so other envs are unaffected.
          LOFT_ADDRESS="${{ vars.LOFT_ADDRESS }}"
          if [ -z "$SITE_ADDRESS" ] || [ -z "$SHARE_ADDRESS" ]; then
            echo "::error::SITE_ADDRESS or SHARE_ADDRESS not set for environment '${{ inputs.environment }}'"
            exit 1
          fi

          # Escape newlines in PEM keys so they stay on one line in .env
          APPLE_PRIVATE_KEY_ESCAPED=$(printf '%s' "$APPLE_PRIVATE_KEY" | sed ':a;N;$!ba;s/\n/\\n/g')
          ASC_PRIVATE_KEY_ESCAPED=$(printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | sed ':a;N;$!ba;s/\n/\\n/g')
          printf '%s\n' \
            "IMAGE_TAG=${IMAGE_TAG}" \
            "REGISTRY=${REGISTRY}" \
            "SITE_ADDRESS=${SITE_ADDRESS}" \
            "SHARE_ADDRESS=${SHARE_ADDRESS}" \
            "SHOP_ADDRESS=${SHOP_ADDRESS}" \
            "LOFT_ADDRESS=${LOFT_ADDRESS}" \
            "AUTH_SECRET=${AUTH_SECRET}" \
            "AUTH_URL=${AUTH_URL}" \
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
            "GOOGLE_IOS_CLIENT_ID=${GOOGLE_IOS_CLIENT_ID}" \
            "GOOGLE_ANDROID_CLIENT_ID=${GOOGLE_ANDROID_CLIENT_ID}" \
            "APPLE_CLIENT_ID=${APPLE_CLIENT_ID}" \
            "APPLE_TEAM_ID=${APPLE_TEAM_ID}" \
            "APPLE_KEY_ID=${APPLE_KEY_ID}" \
            "APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY_ESCAPED}" \
            "ANALYTICS_API_KEY=${ANALYTICS_API_KEY}" \
            "APP_STORE_CONNECT_KEY_ID=${APP_STORE_CONNECT_KEY_ID}" \
            "APP_STORE_CONNECT_ISSUER_ID=${APP_STORE_CONNECT_ISSUER_ID}" \
            "APP_STORE_CONNECT_PRIVATE_KEY=${ASC_PRIVATE_KEY_ESCAPED}" \
            "APP_STORE_CONNECT_APP_ID=${APP_STORE_CONNECT_APP_ID}" \
            "APP_STORE_CONNECT_BETA_GROUP_ID=${APP_STORE_CONNECT_BETA_GROUP_ID}" \
            "SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}" \
            | ssh "$SERVER" 'cat > /opt/deadly/.env && chmod 600 /opt/deadly/.env'

      - name: Backup database to B2
        if: inputs.environment == 'prod'
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_BACKUPS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_BACKUPS_APP_KEY }}
          B2_ENDPOINT: https://s3.us-west-004.backblazeb2.com
        run: |
          # Create backup on server using SQLite's safe .backup command
          HAS_DB=$(ssh "$SERVER" '[ -f /opt/deadly/api-data/users.db ] && echo yes || echo no')
          if [ "$HAS_DB" = "no" ]; then
            echo "No database found — skipping backup (first deploy)"
            exit 0
          fi

          ssh "$SERVER" 'sqlite3 /opt/deadly/api-data/users.db ".backup /tmp/users-backup.db"'
          echo "Backup created on server"

          # Download and upload to B2
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          scp "$SERVER:/tmp/users-backup.db" "/tmp/users-${TIMESTAMP}.db"

          echo "Uploading to B2..."
          aws s3 cp "/tmp/users-${TIMESTAMP}.db" \
            "s3://deadly-backups/db/users-${TIMESTAMP}.db" \
            --endpoint-url "$B2_ENDPOINT" \
            --region us-west-004
          echo "Backup uploaded: s3://deadly-backups/db/users-${TIMESTAMP}.db"

          # Clean up
          ssh "$SERVER" "rm -f /tmp/users-backup.db"
          rm -f "/tmp/users-${TIMESTAMP}.db"

      - name: Deploy
        env:
          SERVER: deploy@${{ steps.server.outputs.ip }}
        run: |
          ssh "$SERVER" bash -s <<'SCRIPT'
            set -euo pipefail
            cd /opt/deadly

            mkdir -p api-data ui-out

            # Ensure the shared external `web` network exists (idempotent). The
            # caddy service joins it to front the independently-deployed emma-shop;
            # without it, `docker compose up` would fail. Safe on every env/deploy.
            docker network create web 2>/dev/null || true

            # Pull new images
            echo "Pulling images..."
            docker compose pull api ui caddy

            # Extract UI static files to staging directory
            echo "Extracting static files..."
            sudo rm -rf ui-out-next
            mkdir -p ui-out-next
            docker compose run --rm --no-deps -T \
              --user "$(id -u):$(id -g)" \
              -v /opt/deadly/ui-out-next:/extract \
              ui sh -c 'cp -r /out/. /extract/' </dev/null

            # Sync new files into ui-out in-place (zero-downtime)
            echo "Syncing UI files..."
            rsync -a --delete ui-out-next/ ui-out/
            sudo rm -rf ui-out-next

            # Restart services
            echo "Restarting containers..."
            docker compose up -d api redis caddy

            docker system prune -f
            docker compose ps
          SCRIPT

      # MUST run before the health check: on a first stand-up the box's DNS may
      # still point at the old server, so the health check (which hits
      # https://SITE_ADDRESS) can't pass until this repoints it. Skipped unless
      # update_dns is set.
      - name: Update DNS (GoDaddy)
        if: inputs.update_dns
        env:
          GODADDY_KEY: ${{ secrets.GODADDY_KEY }}
          GODADDY_SECRET: ${{ secrets.GODADDY_SECRET }}
          SITE_ADDRESS: ${{ vars.SITE_ADDRESS }}
          SHARE_ADDRESS: ${{ vars.SHARE_ADDRESS }}
          NEW_IP: ${{ steps.server.outputs.ip }}
        run: |
          set -euo pipefail
          DOMAIN="thedeadly.app"

          update_record() {
            local fqdn="$1"
            local name
            if [ "$fqdn" = "$DOMAIN" ]; then
              name="@"
            else
              name="${fqdn%.$DOMAIN}"
            fi

            echo "==> $fqdn (name=$name)"
            local current
            current=$(curl -fsS \
              -H "Authorization: sso-key $GODADDY_KEY:$GODADDY_SECRET" \
              "https://api.godaddy.com/v1/domains/$DOMAIN/records/A/$name" \
              | jq -r '.[0].data // empty')

            if [ "$current" = "$NEW_IP" ]; then
              echo "    already $NEW_IP — no PATCH needed"
              return 0
            fi

            echo "    $current -> $NEW_IP — PUTting record"
            curl -fsS -X PUT \
              -H "Authorization: sso-key $GODADDY_KEY:$GODADDY_SECRET" \
              -H "Content-Type: application/json" \
              -d "[{\"data\":\"$NEW_IP\",\"ttl\":600}]" \
              "https://api.godaddy.com/v1/domains/$DOMAIN/records/A/$name" \
              > /dev/null
            echo "    OK"
          }

          update_record "$SITE_ADDRESS"
          update_record "$SHARE_ADDRESS"

          echo "==> Polling dig @1.1.1.1 for $SITE_ADDRESS -> $NEW_IP (up to ~700s)"
          PROPAGATED=0
          DEADLINE=$(( $(date +%s) + 700 ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            RESOLVED=$(dig @1.1.1.1 +short "$SITE_ADDRESS" A | head -1)
            if [ "$RESOLVED" = "$NEW_IP" ]; then
              echo "    1.1.1.1 now resolves $SITE_ADDRESS to $NEW_IP"
              PROPAGATED=1
              break
            fi
            echo "    currently resolves to '${RESOLVED:-<empty>}', sleeping 15s..."
            sleep 15
          done
          if [ "$PROPAGATED" -ne 1 ]; then
            echo "::warning::DNS did not propagate to 1.1.1.1 within 700s. The GoDaddy PUT succeeded; propagation may still be in progress."
          fi

          # The box's Caddy is already up (Deploy step) and may be in ACME
          # back-off from failing against the OLD IP. Now that DNS is correct,
          # restart it so it re-obtains certs immediately instead of waiting out
          # the back-off — otherwise the health check below races cert issuance.
          echo "==> Restarting Caddy on $NEW_IP to re-obtain certs now that DNS is correct"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new deploy@"$NEW_IP" \
            "cd /opt/deadly && docker compose restart caddy" || true
          echo "==> Giving Caddy ~30s to obtain certificates"
          sleep 30

      - name: Health check
        env:
          SITE: https://${{ vars.SITE_ADDRESS }}
        run: |
          echo "Waiting for $SITE/api/health ..."
          for i in $(seq 1 24); do
            if curl -fsSk "$SITE/api/health" -o /dev/null 2>/dev/null; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "  Attempt $i/24 — waiting 5s..."
            sleep 5
          done
          echo "::warning::Health check did not pass within 2 minutes"
          exit 1

      - name: Job summary
        if: always()
        env:
          SERVER_IP: ${{ steps.server.outputs.ip }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          REF: ${{ inputs.ref }}
          ENV: ${{ inputs.environment }}
          SITE: ${{ vars.SITE_ADDRESS }}
        run: |
          HEALTH="unknown"
          if curl -fsSk "https://${SITE}/api/health" -o /dev/null 2>/dev/null; then
            HEALTH="healthy"
          else
            HEALTH="unhealthy"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deploy Summary

          | Field | Value |
          |-------|-------|
          | Environment | \`${ENV}\` |
          | Ref | \`${REF}\` |
          | Image tag | \`${IMAGE_TAG::12}\` |
          | Server IP | \`${SERVER_IP}\` |
          | Health | ${HEALTH} |
          | Site | [${SITE}](https://${SITE}) |
          EOF
