name: Infrastructure Manage

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - launch
          - destroy
      provider:
        description: "Cloud provider"
        required: true
        type: choice
        options:
          - digitalocean
          - oci
        default: digitalocean
      environment:
        description: "Environment to manage"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - prod
        default: alpha

permissions:
  contents: read

jobs:
  infra:
    name: "${{ inputs.action }} ${{ inputs.environment }} (${{ inputs.provider }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_TFSTATE_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_TFSTATE_APP_KEY }}
      TF_DIR: infra/${{ inputs.provider }}

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Write provider credentials
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ "${{ inputs.provider }}" = "digitalocean" ]; then
            cat > terraform.tfvars <<EOF
          do_token = "${{ secrets.DO_API_TOKEN }}"
          EOF
          fi

      - name: Write SSH public key
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ssh-key-2026-03-15.key.pub

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Resolve Terraform target
        id: target
        run: |
          ENV="${{ inputs.environment }}"
          PROVIDER="${{ inputs.provider }}"
          if [ "$PROVIDER" = "digitalocean" ]; then
            echo "droplet=-target=digitalocean_droplet.${ENV}" >> "$GITHUB_OUTPUT"
            echo "firewall=-target=digitalocean_firewall.${ENV}" >> "$GITHUB_OUTPUT"
            echo "output_key=${ENV}_ip" >> "$GITHUB_OUTPUT"
          else
            echo "droplet=-target=oci_core_instance.${ENV}" >> "$GITHUB_OUTPUT"
            echo "firewall=" >> "$GITHUB_OUTPUT"
            echo "output_key=${ENV}_ip" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Apply
        if: inputs.action == 'launch'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            ${{ steps.target.outputs.droplet }} \
            ${{ steps.target.outputs.firewall }}

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -auto-approve \
            ${{ steps.target.outputs.droplet }} \
            ${{ steps.target.outputs.firewall }}

      - name: Get outputs
        if: inputs.action == 'launch'
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "ip=$(terraform output -raw ${{ steps.target.outputs.output_key }})" >> "$GITHUB_OUTPUT"

      - name: Wait for cloud-init
        if: inputs.action == 'launch'
        run: |
          echo "Waiting for cloud-init to complete..."
          IP="${{ steps.outputs.outputs.ip }}"
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$IP" >> ~/.ssh/known_hosts 2>/dev/null || true

          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 "deploy@${IP}" \
              "test -f /opt/deadly/.cloud-init-complete" 2>/dev/null; then
              echo "Cloud-init complete!"
              exit 0
            fi
            echo "  Attempt $i/30 — waiting 10s..."
            sleep 10
          done
          echo "::warning::Cloud-init did not complete within 5 minutes"

      - name: Verify server
        if: inputs.action == 'launch'
        run: |
          IP="${{ steps.outputs.outputs.ip }}"
          echo "## Server Details" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | ${{ inputs.provider }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| IP | \`${IP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SSH | \`ssh -i ssh-key deploy@${IP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Installed software" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ssh -o StrictHostKeyChecking=no "deploy@${IP}" \
            "docker --version; docker compose version; sqlite3 --version; free -h | head -3; sudo ufw status" \
            >> "$GITHUB_STEP_SUMMARY" 2>&1
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Destroy summary
        if: inputs.action == 'destroy'
        run: |
          echo "## Infrastructure Destroyed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | **${{ inputs.provider }}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | **${{ inputs.environment }}** |" >> "$GITHUB_STEP_SUMMARY"
